# Dependabot Configuration
# Mantiene las actions actualizadas automáticamente

version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "security-team"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"

  # NPM Dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "security-team"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "production"
    ignore:
      # Ignorar cambios mayores que requieren revisión manual
      - dependency-name: "webpack"
        update-types:
          - "version-update:semver-major"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "security-team"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker): "
      include: "scope"
